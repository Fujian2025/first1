<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画一画！- 绘画小游戏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-paint-brush"></i> 画一画！</h1>
            <p class="subtitle">一个有趣的绘画挑战游戏</p>
        </header>

        <div class="game-container">
            <div class="left-panel">
                <div class="challenge-card">
                    <h2><i class="fas fa-bullseye"></i> 今日挑战</h2>
                    <div class="item-display">
                        <div class="item-icon">
                            <i class="fas fa-question-circle"></i>
                        </div>
                        <div class="item-name" id="item-name">Loading...</div>
                    </div>
                    <p class="instruction">尽你所能画出上面显示的物品！</p>

                    <div class="controls">
                        <button id="new-item-btn" class="btn btn-primary">
                            <i class="fas fa-random"></i> 随机新物品
                        </button>
                        <button id="hint-btn" class="btn btn-secondary">
                            <i class="fas fa-lightbulb"></i> 显示提示
                        </button>
                    </div>

                    <div class="hint-box" id="hint-box">
                        <p><strong>提示：</strong> <span id="hint-text">点击"显示提示"获取提示</span></p>
                    </div>
                </div>

                <div class="tools-card">
                    <h2><i class="fas fa-tools"></i> 绘画工具</h2>

                    <div class="tool-section">
                        <h3><i class="fas fa-palette"></i> 颜色</h3>
                        <div class="color-picker">
                            <div class="color-option" data-color="#000000" style="background-color: #000000;"></div>
                            <div class="color-option" data-color="#FF3B30" style="background-color: #FF3B30;"></div>
                            <div class="color-option" data-color="#007AFF" style="background-color: #007AFF;"></div>
                            <div class="color-option" data-color="#4CD964" style="background-color: #4CD964;"></div>
                            <div class="color-option" data-color="#FF9500" style="background-color: #FF9500;"></div>
                            <div class="color-option" data-color="#5856D6" style="background-color: #5856D6;"></div>
                            <div class="color-option" data-color="#FFCC00" style="background-color: #FFCC00;"></div>
                            <div class="color-option" data-color="#8E8E93" style="background-color: #8E8E93;"></div>
                        </div>
                        <div class="custom-color">
                            <label for="custom-color">自定义：</label>
                            <input type="color" id="custom-color" value="#000000">
                        </div>
                    </div>

                    <div class="tool-section">
                        <h3><i class="fas fa-paint-brush"></i> 画笔大小</h3>
                        <div class="brush-size">
                            <input type="range" id="brush-slider" min="1" max="50" value="5">
                            <div class="brush-preview">
                                <div class="brush-circle" id="brush-circle"></div>
                                <span id="brush-size-text">5px</span>
                            </div>
                        </div>
                    </div>

                    <div class="tool-actions">
                        <button id="clear-btn" class="btn btn-danger">
                            <i class="fas fa-trash-alt"></i> 清空画布
                        </button>
                        <button id="undo-btn" class="btn btn-secondary">
                            <i class="fas fa-undo"></i> 撤销
                        </button>
                        <button id="save-btn" class="btn btn-success">
                            <i class="fas fa-download"></i> 保存绘画
                        </button>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="canvas-container">
                    <div class="canvas-header">
                        <h3><i class="fas fa-paint-brush"></i> 您的绘画画布</h3>
                        <div class="canvas-stats">
                            <span id="drawing-time">时间：0:00</span>
                            <span id="stroke-count">笔划：0</span>
                        </div>
                    </div>
                    <canvas id="drawing-canvas" width="800" height="600">
                        您的浏览器不支持canvas元素。
                    </canvas>
                    <div class="canvas-footer">
                        <p><i class="fas fa-info-circle"></i> 点击并拖动来绘画。使用左侧工具进行自定义。</p>
                    </div>
                </div>

                <div class="gallery-card">
                    <h2><i class="fas fa-images"></i> 最近绘画</h2>
                    <div class="gallery">
                        <div class="gallery-placeholder">
                            <p>保存后您的绘画将显示在这里</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>画一画！&copy; 2026 - 一个有趣的绘画小游戏 | 由Claude <i class="fas fa-heart"></i> 制作</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
